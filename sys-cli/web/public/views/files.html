<div x-data="filesState()" x-init="init()">

  <!-- Header -->
  <div style="margin-bottom:1.5rem;">
    <h1 style="font-size:1.5rem; font-weight:700; color:var(--text-primary);">File Management</h1>
  </div>

  <!-- Find Large Files Card -->
  <div class="card">
    <div class="card-title">Find Large Files</div>
    <div class="form-row" style="align-items:flex-end;">
      <div>
        <label>Directory</label>
        <input type="text" x-model="dir" placeholder="e.g. /var/log" />
      </div>
      <div style="max-width:140px;">
        <label>Min Size</label>
        <input type="text" x-model="size" placeholder="100M" />
      </div>
      <div style="flex:0;">
        <button class="btn btn-primary" x-on:click="findLargeFiles()" :disabled="findLoading || !dir.trim()">
          <span x-show="findLoading" class="spinner" style="width:14px;height:14px;margin-right:0.25rem;"></span>
          <span x-show="!findLoading">Search</span>
        </button>
      </div>
    </div>

    <div x-show="findError" class="alert alert-error" x-text="findError"></div>

    <div x-show="largeFiles.length > 0" style="margin-top:1rem; overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th style="width:120px;">Size</th>
            <th>Path</th>
            <th style="width:160px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(file, i) in largeFiles" :key="i">
            <tr>
              <td class="monospace" x-text="file.size"></td>
              <td class="monospace" style="word-break:break-all;" x-text="file.path"></td>
              <td>
                <button class="btn btn-secondary btn-sm" style="margin-right:0.25rem;"
                  x-on:click="$root.showToast('Use terminal to compress files', 'info')">
                  Compress
                </button>
                <button class="btn btn-danger btn-sm" x-on:click="deleteSingleFile(file.path)">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <div x-show="!findLoading && largeFilesSearched && largeFiles.length === 0 && !findError" class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-text">No files found matching the criteria</div>
    </div>
  </div>

  <!-- Batch Delete Card -->
  <div class="card">
    <div class="card-title">Batch Delete</div>
    <div class="form-row" style="align-items:flex-end;">
      <div>
        <label>Directory</label>
        <input type="text" x-model="deleteDir" placeholder="e.g. /tmp" />
      </div>
      <div>
        <label>Glob Pattern</label>
        <input type="text" x-model="deletePattern" placeholder="e.g. *.log" />
      </div>
      <div style="flex:0;">
        <button class="btn btn-danger" x-on:click="batchDelete()" :disabled="batchLoading || !deleteDir.trim() || !deletePattern.trim()">
          <span x-show="batchLoading" class="spinner" style="width:14px;height:14px;margin-right:0.25rem;"></span>
          <span x-show="!batchLoading">Delete</span>
        </button>
      </div>
    </div>
    <div x-show="batchError" class="alert alert-error" x-text="batchError"></div>
    <div x-show="batchSuccess" class="alert alert-success" x-text="batchSuccess"></div>
  </div>

  <!-- Set Permissions Card -->
  <div class="card">
    <div class="card-title">Set Permissions</div>
    <div class="form-row">
      <div>
        <label>Directory</label>
        <input type="text" x-model="chmodDir" placeholder="e.g. /var/www/html" />
      </div>
      <div>
        <label>File Mode (octal)</label>
        <input type="text" x-model="fmode" placeholder="e.g. 644" maxlength="4" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Dir Mode (octal)</label>
        <input type="text" x-model="dmode" placeholder="e.g. 755" maxlength="4" />
      </div>
      <div>
        <label>Owner (user:group)</label>
        <input type="text" x-model="owner" placeholder="e.g. www-data:www-data" />
      </div>
    </div>
    <div x-show="chmodValidationError" class="alert alert-error" x-text="chmodValidationError"></div>
    <div x-show="chmodError" class="alert alert-error" x-text="chmodError"></div>
    <div x-show="chmodSuccess" class="alert alert-success" x-text="chmodSuccess"></div>
    <button class="btn btn-primary" x-on:click="applyPermissions()" :disabled="chmodLoading || !chmodDir.trim()">
      <span x-show="chmodLoading" class="spinner" style="width:14px;height:14px;margin-right:0.25rem;"></span>
      <span x-show="!chmodLoading">Apply</span>
    </button>
  </div>

  <!-- Delete Confirm Modal -->
  <div x-show="confirmDelete" class="modal-overlay" style="display:flex;" x-cloak>
    <div class="modal">
      <div class="modal-title">Confirm Delete</div>
      <p style="color:var(--text-muted); margin-bottom:1rem; word-break:break-all;">
        Permanently delete: <strong x-text="confirmDelete ? confirmDelete.path : ''"></strong>?
      </p>
      <p class="alert alert-error" style="margin-bottom:0;">This action cannot be undone.</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" x-on:click="confirmDelete = null">Cancel</button>
        <button class="btn btn-danger" x-on:click="executeDelete()">Delete</button>
      </div>
    </div>
  </div>

</div>
