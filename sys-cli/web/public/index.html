<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sys-cli — System Management</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body x-data="sysApp()" x-init="init()">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">sys-cli</div>
      <div class="sidebar-version">v1.0.0</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item" :class="{ active: activeModule === 'processes' }" @click="loadModule('processes')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h2M7 12h2M13 8h4M13 12h4"/></svg>
        </span>
        <span class="nav-label">Processes</span>
      </div>
      <div class="nav-item" :class="{ active: activeModule === 'network' }" @click="loadModule('network')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </span>
        <span class="nav-label">Network</span>
      </div>
      <div class="nav-item" :class="{ active: activeModule === 'firewall' }" @click="loadModule('firewall')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </span>
        <span class="nav-label">Firewall</span>
      </div>
      <div class="nav-item" :class="{ active: activeModule === 'packages' }" @click="loadModule('packages')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </span>
        <span class="nav-label">Packages</span>
      </div>
      <div class="nav-item" :class="{ active: activeModule === 'files' }" @click="loadModule('files')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span class="nav-label">Files</span>
      </div>
      <div class="nav-item" :class="{ active: activeModule === 'cron' }" @click="loadModule('cron')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
        </span>
        <span class="nav-label">Cron Jobs</span>
      </div>
      <div class="nav-item" :class="{ active: activeModule === 'time' }" @click="loadModule('time')">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
        <span class="nav-label">System Time</span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Loading spinner -->
    <div x-show="loading" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Module views injected via x-html; component functions live in components.js -->
    <div x-show="activeModule === 'processes'" x-html="views.processes"></div>
    <div x-show="activeModule === 'network'" x-html="views.network"></div>
    <div x-show="activeModule === 'firewall'" x-html="views.firewall"></div>
    <div x-show="activeModule === 'packages'" x-html="views.packages"></div>
    <div x-show="activeModule === 'files'" x-html="views.files"></div>
    <div x-show="activeModule === 'cron'" x-html="views.cron"></div>
    <div x-show="activeModule === 'time'" x-html="views.time"></div>
  </main>

  <!-- Sudo password modal -->
  <div x-show="sudo.visible" class="modal-overlay" style="display:flex;" x-cloak>
    <div class="modal" style="max-width:380px;">
      <div class="modal-title" style="display:flex; align-items:center; gap:0.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Sudo Password Required
      </div>
      <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:1rem;">
        This action requires elevated privileges. Enter your sudo password to continue.
      </p>
      <div x-show="sudo.error" class="alert alert-error" style="margin-bottom:0.75rem;" x-text="sudo.error"></div>
      <label style="font-size:0.875rem; font-weight:500; display:block; margin-bottom:0.35rem;">Password</label>
      <input
        type="password"
        x-model="sudo.password"
        placeholder="Enter sudo password"
        style="margin-bottom:1rem;"
        x-on:keydown.enter="sudoConfirm()"
        x-ref="sudoInput"
        x-effect="sudo.visible && $nextTick(() => $refs.sudoInput && $refs.sudoInput.focus())"
      />
      <div class="modal-footer">
        <button class="btn btn-secondary" x-on:click="sudoCancel()" :disabled="sudo.loading">Cancel</button>
        <button class="btn btn-primary" x-on:click="sudoConfirm()" :disabled="sudo.loading || !sudo.password.trim()">
          <span x-show="sudo.loading" class="spinner" style="width:14px;height:14px;margin-right:0.25rem;"></span>
          <span x-show="!sudo.loading">Confirm</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div
    class="toast"
    :class="'toast-' + toast.type"
    x-show="toast.visible"
    x-transition
    x-text="toast.message"
  ></div>

  <!-- components.js must load before alpine.min.js (which has defer) -->
  <script src="/js/htmx.min.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/alpine.min.js" defer></script>
</body>
</html>
